<style>

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:#050816;
}

.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%,rgba(255,215,0,.15),transparent 30%),
    radial-gradient(circle at 80% 80%,rgba(0,255,255,.12),transparent 30%),
    linear-gradient(135deg,#020617,#0f172a,#111827);
}

.bg::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(255,215,0,.08);
    border-radius:50%;
    filter:blur(120px);
    top:-150px;
    left:-100px;
}

.bg::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(0,255,255,.06);
    border-radius:50%;
    filter:blur(120px);
    bottom:-150px;
    right:-100px;
}

.card{
    position:relative;
    z-index:10;
    width:90%;
    max-width:500px;
    padding:40px;
    text-align:center;
    border-radius:30px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,.1);
    box-shadow:
    0 25px 60px rgba(0,0,0,.45),
    inset 0 0 20px rgba(255,255,255,.05);
}

.profile{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #FFD700;
    box-shadow:0 0 30px rgba(255,215,0,.6);

}

    height:50px;
    margin:20px auto;
    border:4px solid rgba(255,255,255,.15);

<script>

    let h = Math.floor(seconds / 3600);
    let m = Math.floor((seconds % 3600) / 60);
    let s = seconds % 60;

    countdown.innerHTML =
        String(h).padStart(2,'0') + ":" +
        String(m).padStart(2,'0') + ":" +
        String(s).padStart(2,'0');

    if(seconds <= 0){
        clearInterval(timer);

    seconds--;

}, 1000);
